<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Customers | InsureDesk</title>
  <meta name="theme-color" content="#0f766e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="InsureDesk">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/app-icon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="assets/styles.css">
</head>
<body>
  <div data-shell class="app-shell">
    <main class="customers-layout">
      <section class="panel">
        <p class="eyebrow">Owners</p>
        <h1>Customer Records</h1>
        <input class="wide-search" data-search placeholder="Search by owner, mobile number or vehicle reg no">
        <div class="stack-list" data-list></div>
      </section>
      <section class="panel details-panel" data-details hidden></section>
      <section class="panel customer-form-panel">
        <h2>Add or Update Customer</h2>
        <form id="customerForm" class="data-form">
          <label>Type of Vehicles<select name="vehicle_type" id="customer_vehicle_type"></select></label>
          <label>Vehicle's owner name<input name="owner_name" placeholder="Enter owner's name" required></label>
          <label>Finance company name<input name="finance_company_name" placeholder="Enter finance company name"></label>
          <label>Owner's mobile number<input name="owner_mobile" placeholder="Enter mobile number" required></label>
          <label>Vehicle reg no<input name="vehicle_reg_no" placeholder="Enter vehicle registration number" required></label>
          <label>Vehicle's company name<input name="vehicle_company_name" placeholder="Enter vehicle company name" required></label>
          <label>Vehicle's model name<input name="vehicle_model_name" placeholder="Enter vehicle model name" required></label>
          <label>Insurance company name<input name="insurance_company_name" placeholder="Enter insurance company name"></label>
          <label>Vehicle's FC expiry date<input name="fc_expiry_date" type="date"></label>
          <label>Vehicle's Insurance expiry date<input name="insurance_expiry_date" type="date"></label>
          <label>Policy issued date<input name="policy_issued_date" type="date"></label>
          <label>Vehicle's Permit expiry date<input name="permit_expiry_date" type="date"></label>
          <label>Insurance invoice amount<input name="invoice_amount" type="number" min="0" placeholder="Enter invoice amount"></label>
          <label>Payment status<select name="payment_status"><option>Pending</option><option>Paid</option></select></label>
          <label>Insurance invoice PDF<span class="file-input-row"><input name="invoice_pdf" type="file" accept="application/pdf"><button class="clear-file" type="button" data-clear-file="invoice_pdf" title="Cancel selected invoice PDF" aria-label="Cancel selected invoice PDF">×</button></span></label>
          <label>Customer proof PDFs <small class="field-hint">Upload up to 8 proof PDFs</small><span class="file-input-row"><input name="customer_proofs" type="file" accept="application/pdf" multiple><button class="clear-file" type="button" data-clear-file="customer_proofs" title="Cancel selected proof PDFs" aria-label="Cancel selected proof PDFs">×</button></span></label>
          <label>Vehicle proof images<span class="file-input-row"><input name="vehicle_images" type="file" accept="image/*" multiple><button class="clear-file" type="button" data-clear-file="vehicle_images" title="Cancel selected vehicle images" aria-label="Cancel selected vehicle images">×</button></span></label>
          <label>Insurance agent<select name="insurance_agent_id" id="insurance_agent_id"></select></label>
          <button class="btn primary" type="submit">Save Customer</button>
        </form>
        <p data-save-message class="form-message"></p>
      </section>
    </main>
  </div>
  <script type="module" src="assets/customers.js"></script>
</body>
</html>
